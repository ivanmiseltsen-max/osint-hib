            gap: 20px;

        }

        .music-player button {
            background: none;
            border: none;
            color: #00f7ff;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.2s;
        }

        .music-player button:hover {
            background: rgba(0, 247, 255, 0.1);
            transform: scale(1.1);
        }

        .music-player input[type="range"] {
            width: 120px;
            height: 5px;
            -webkit-appearance: none;
            background: #ddd;
            border-radius: 5px;
        }

        .music-player input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #00f7ff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #00f7ff;

        .music-player span {
            color: #333;
            font-weight: 600;
            letter-spacing: 1px;
        }

            border-radius: 20px;

            align-items: center;
            flex-wrap: wrap;

        const playPromise = music.play();
        if (playPromise !== undefined) {
            playPromise.catch(() => {
                playBtn.textContent = '▶️';
            });
        }

        playBtn.onclick = () => {
            if (music.paused) {
                music.play();
                playBtn.textContent = '⏸️';
            } else {
                music.pause();
                playBtn.textContent = '▶️';
            }

        let currentCategory = 'tools';

        function showCategory(category) {
            currentCategory = category;
            
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.classList.add('active');
            
            displayItems();
        }

        function displayItems() {
            const grid = document.getElementById('itemsGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            grid.innerHTML = '';
            
            const items = knowledgeBase[currentCategory].filter(item => {
                if (!search) return true;
                return item.name.toLowerCase().includes(search) ||
                       item.desc.toLowerCase().includes(search) ||
                       item.tags.some(t => t.includes(search));
            });

            items.forEach(item => {
                grid.innerHTML += `
                    <div class="card">
                        <h2>${item.name}</h2>
                        <div class="category">${currentCategory}</div>
                        <p>${item.desc}</p>
                        <div class="tags">
                            ${item.tags.map(t => `<span class="tag">#${t}</span>`).join('')}
                        </div>
                    </div>
                `;
            });

            if (items.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 50px; color: #666;">Ничего не найдено</div>';
            }
        }

        function searchItems() {
            displayItems();
        }

        displayItems();
