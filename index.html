<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT HUB | Чат</title>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0c0f;
            color: #fff;
            padding: 20px;
        }
        
        /* Музыка */
        .music-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1f2a;
            border: 1px solid #00ff9d;
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            gap: 15px;
            z-index: 1000;
        }
        
        .music-player button {
            background: none;
            border: none;
            color: #00ff9d;
            font-size: 20px;
            cursor: pointer;
        }
        
        .music-player input {
            width: 100px;
        }
        
        /* Шапка */
        .navbar {
            background: #1a1f2a;
            border: 1px solid #00ff9d;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .logo {
            color: #00ff9d;
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .auth-btn {
            background: #00ff9d;
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-name {
            color: #00ff9d;
        }
        
        /* Модалка входа */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1f2a;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #00ff9d;
            width: 90%;
            max-width: 300px;
        }
        
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #0a0c0f;
            border: 1px solid #00ff9d;
            border-radius: 5px;
            color: white;
        }
        
        /* Чат */
        .chat-container {
            background: #1a1f2a;
            border: 1px solid #00ff9d;
            border-radius: 10px;
            padding: 20px;
        }
        
        .messages {
            height: 400px;
            overflow-y: auto;
            background: #0a0c0f;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        .message {
            padding: 8px;
            margin: 5px 0;
            background: #2a2f3a;
            border-radius: 5px;
        }
        
        .message-author {
            color: #00ff9d;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .message-time {
            color: #666;
            font-size: 0.8rem;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 10px;
            background: #0a0c0f;
            border: 1px solid #00ff9d;
            border-radius: 5px;
            color: #fff;
        }
        
        .input-area button {
            padding: 10px 20px;
            background: #00ff9d;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        /* Авторы */
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #666;
        }
        
        .authors {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- Музыка -->
    <div class="music-player">
        <button id="playPause">⏸️</button>
        <input type="range" id="volume" min="0" max="1" step="0.1" value="0.3">
        <span>Lofi</span>
    </div>
    
    <!-- Шапка -->
    <div class="navbar">
        <div class="logo">OSINT HUB</div>
        <div id="auth">
            <button class="auth-btn" onclick="showLoginModal()">Войти</button>
        </div>
    </div>
    
    <!-- Основной контент -->
    <div class="chat-container" id="chatContainer" style="display:none;">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageText" placeholder="Сообщение...">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>
    
    <div id="notLogged" style="text-align: center; padding: 40px; color: #666;">
        Войдите, чтобы начать общение
    </div>
    
    <!-- Модалка входа -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h3 style="color:#00ff9d; margin-bottom:20px;">Вход</h3>
            <input type="text" id="loginName" placeholder="Ваше имя">
            <button class="auth-btn" onclick="login()" style="width:100%;">Войти</button>
        </div>
    </div>
    
    <!-- Авторы -->
    <footer>
        <div class="authors">
            <div>@eaxpa — программист</div>
            <div>@kmarabia — дизайнер</div>
        </div>
        <div>© 2025 OSINT HUB</div>
    </footer>
    
    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b8c5a6d0.mp3?filename=lofi-study-112191.mp3">
    </audio>
    
    <script>
        // ========== SUPABASE ==========
        const supabaseUrl = 'https://vxmqvxukiugrrzevtlgi.supabase.co'
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4bXF2eHVraXVncnJ6ZXZ0bGdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTUwNDgsImV4cCI6MjA4Nzk3MTA0OH0.cBXbx-luSnd_dRCTSkFl8pvjtsP1NjwGYipF-XK1zBg'
        
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)
        
        // ========== МУЗЫКА ==========
        const music = document.getElementById('bgMusic')
        const playBtn = document.getElementById('playPause')
        const volume = document.getElementById('volume')
        
        music.volume = 0.3
        music.play().catch(() => playBtn.textContent = '▶️')
        
        playBtn.onclick = () => {
            if (music.paused) {
                music.play()
                playBtn.textContent = '⏸️'
            } else {
                music.pause()
                playBtn.textContent = '▶️'
            }
        }
        
        volume.oninput = (e) => music.volume = e.target.value
        
        // ========== ПОЛЬЗОВАТЕЛЬ ==========
        let currentUser = null
        
        // Проверяем localStorage при загрузке
        const savedUser = localStorage.getItem('osint_user')
        if (savedUser) {
            currentUser = JSON.parse(savedUser)
            showChat()
        }
        
        function showLoginModal() {
            document.getElementById('loginModal').classList.add('active')
        }
        
        function closeModal() {
            document.getElementById('loginModal').classList.remove('active')
        }
        
        async function login() {
            const name = document.getElementById('loginName').value.trim()
            if (!name) return
            
            // Проверяем, есть ли пользователь в БД
            const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('name', name)
            
            if (data && data.length > 0) {
                currentUser = data[0]
            } else {
                // Создаём нового
                const { data: newUser, error } = await supabase
                    .from('users')
                    .insert({ name: name })
                    .select()
                currentUser = newUser[0]
            }
            
            localStorage.setItem('osint_user', JSON.stringify(currentUser))
            closeModal()
            showChat()
        }
        
        function logout() {
            localStorage.removeItem('osint_user')
            currentUser = null
            document.getElementById('chatContainer').style.display = 'none'
            document.getElementById('notLogged').style.display = 'block'
            document.getElementById('auth').innerHTML = '<button class="auth-btn" onclick="showLoginModal()">Войти</button>'
        }
        
        function showChat() {
            document.getElementById('notLogged').style.display = 'none'
            document.getElementById('chatContainer').style.display = 'block'
            document.getElementById('auth').innerHTML = `
                <div class="user-info">
                    <span class="user-name">${currentUser.name}</span>
                    <button class="auth-btn" onclick="logout()">Выйти</button>
                </div>
            `
            loadMessages()
        }
        
        // ========== ЧАТ ==========
        async function loadMessages() {
            const { data } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true })
            
            if (data) {
                const div = document.getElementById('messages')
                div.innerHTML = data.map(msg => `
                    <div class="message">
                        <span class="message-author">${msg.author}</span>
                        <span class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</span>
                        <div>${msg.text}</div>
                    </div>
                `).join('')
                div.scrollTop = div.scrollHeight
            }
            
            // Подписка на новые сообщения
            supabase
                .channel('messages')
                .on('postgres_changes', { 
                    event: 'INSERT', 
                    schema: 'public', 
                    table: 'messages' 
                }, payload => {
                    const div = document.getElementById('messages')
                    div.innerHTML += `
                        <div class="message">
                            <span class="message-author">${payload.new.author}</span>
                            <span class="message-time">${new Date(payload.new.created_at).toLocaleTimeString()}</span>
                            <div>${payload.new.text}</div>
                        </div>
                    `
                    div.scrollTop = div.scrollHeight
                })
                .subscribe()
        }
        
        async function sendMessage() {
            if (!currentUser) return
            
            const text = document.getElementById('messageText').value
            if (!text) return
            
            await supabase.from('messages').insert({
                text: text,
                author: currentUser.name,
                author_id: currentUser.id
            })
            
            document.getElementById('messageText').value = ''
        }
    </script>
</body>
  </html>
