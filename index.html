<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT CHAT</title>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, sans-serif;
            background: #0a0c0f;
            color: white;
            padding: 15px;
        }
        
        /* Музыка */
        .music-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1f2a;
            border: 1px solid #00ff9d;
            border-radius: 50px;
            padding: 10px 15px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }
        
        .music-player button {
            background: none;
            border: none;
            color: #00ff9d;
            font-size: 20px;
            cursor: pointer;
        }
        
        /* Шапка */
        .header {
            background: #1a1f2a;
            border: 1px solid #00ff9d;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            color: #00ff9d;
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .name-input {
            background: #0a0c0f;
            border: 1px solid #00ff9d;
            border-radius: 20px;
            padding: 8px 15px;
            color: white;
            width: 150px;
        }
        
        /* Чат */
        .chat-container {
            background: #1a1f2a;
            border: 1px solid #00ff9d;
            border-radius: 10px;
            padding: 15px;
            height: 70vh;
            display: flex;
            flex-direction: column;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            background: #0a0c0f;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        .message {
            padding: 8px;
            margin: 5px 0;
            background: #2a2f3a;
            border-radius: 5px;
        }
        
        .message-author {
            color: #00ff9d;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .message-time {
            color: #666;
            font-size: 0.7rem;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 10px;
            background: #0a0c0f;
            border: 1px solid #00ff9d;
            border-radius: 5px;
            color: white;
        }
        
        .input-area button {
            padding: 10px 20px;
            background: #00ff9d;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Авторы */
        footer {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- Музыка -->
    <div class="music-player">
        <button id="playPause">⏸️</button>
        <input type="range" id="volume" min="0" max="1" step="0.1" value="0.3" style="width:80px">
        <span style="color:#00ff9d">Lofi</span>
    </div>
    
    <!-- Шапка с именем -->
    <div class="header">
        <div class="logo">OSINT CHAT</div>
        <input type="text" id="userName" class="name-input" placeholder="Ваше имя" value="Аноним">
    </div>
    
    <!-- Чат -->
    <div class="chat-container">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageText" placeholder="Сообщение..." autocomplete="off">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>
    
    <!-- Авторы -->
    <footer>
        <div>@eaxpa • @kmarabia</div>
        <div style="font-size:0.8rem">2025</div>
    </footer>
    
    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b8c5a6d0.mp3?filename=lofi-study-112191.mp3">
    </audio>
    
    <script>
        // ========== SUPABASE ==========
        const supabase = window.supabase.createClient(
            'https://vxmqvxukiugrrzevtlgi.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4bXF2eHVraXVncnJ6ZXZ0bGdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTUwNDgsImV4cCI6MjA4Nzk3MTA0OH0.cBXbx-luSnd_dRCTSkFl8pvjtsP1NjwGYipF-XK1zBg'
        )
        
        // ========== МУЗЫКА ==========
        const music = document.getElementById('bgMusic')
        const playBtn = document.getElementById('playPause')
        const volume = document.getElementById('volume')
        
        music.volume = 0.3
        music.play().catch(() => playBtn.textContent = '▶️')
        
        playBtn.onclick = () => {
            if (music.paused) {
                music.play()
                playBtn.textContent = '⏸️'
            } else {
                music.pause()
                playBtn.textContent = '▶️'
            }
        }
        
        volume.oninput = (e) => music.volume = e.target.value
        
        // ========== ЧАТ ==========
        async function loadMessages() {
            const { data } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(50)
            
            if (data) {
                const div = document.getElementById('messages')
                div.innerHTML = ''
                data.forEach(msg => {
                    div.innerHTML += `
                        <div class="message">
                            <span class="message-author">${msg.author}</span>
                            <span class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</span>
                            <div>${msg.text}</div>
                        </div>
                    `
                })
                div.scrollTop = div.scrollHeight
            }
        }
        
        async function sendMessage() {
            const author = document.getElementById('userName').value || 'Аноним'
            const text = document.getElementById('messageText').value.trim()
            
            if (!text) return
            
            const { error } = await supabase
                .from('messages')
                .insert({ author: author, text: text })
            
            if (!error) {
                document.getElementById('messageText').value = ''
            }
        }
        
        // Подписка на новые сообщения
        supabase
            .channel('messages')
            .on('postgres_changes', { 
                event: 'INSERT', 
                schema: 'public', 
                table: 'messages' 
            }, payload => {
                const div = document.getElementById('messages')
                div.innerHTML += `
                    <div class="message">
                        <span class="message-author">${payload.new.author}</span>
                        <span class="message-time">${new Date(payload.new.created_at).toLocaleTimeString()}</span>
                        <div>${payload.new.text}</div>
                    </div>
                `
                div.scrollTop = div.scrollHeight
            })
            .subscribe()
        
        // Загружаем сообщения при старте
        loadMessages()
        
        // Отправка по Enter
        document.getElementById('messageText').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage()
        })
    </script>
</body>
  </html>
