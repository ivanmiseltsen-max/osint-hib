                playBtn.textContent = '⏸️';
            } else {
                music.pause();
                playBtn.textContent = '▶️';
            }
        };
        
        volume.oninput = (e) => music.volume = e.target.value;
        
        // ========== АВТОРИЗАЦИЯ ==========
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (userDoc.exists) {
                    userPrefix = userDoc.data().prefix || 'user';
                    isAdmin = userPrefix === 'admin';
                    currentUserName = userDoc.data().name || user.displayName;
                } else {
                    currentUserName = user.displayName;
                    await db.collection('users').doc(user.uid).set({
                        name: user.displayName,
                        email: user.email,
                        photo: user.photoURL,
                        prefix: 'user',
                        joined: new Date()
                    });
                }
                
                updateUI();
                loadTopics();
                loadUsers();
            } else {
                currentUser = null;
                userPrefix = 'user';
                isAdmin = false;
                updateUI();
                document.getElementById('topicsList').innerHTML = '<p style="color:#666; text-align:center;">Войдите, чтобы видеть темы</p>';
            }
        });
        
        function loginWithGoogle() {
            auth.signInWithPopup(googleProvider).catch(console.error);
        }
        
        function logout() {
            auth.signOut();
            currentTopic = null;
            document.getElementById('chatContainer').style.display = 'none';
        }
        
        function updateUI() {
            const authSection = document.getElementById('authSection');
            
            if (currentUser) {
                authSection.innerHTML = `
                    <img src="${currentUser.photoURL || 'https://via.placeholder.com/40'}" class="user-avatar">
                    <span class="user-name" onclick="showChangeNickModal()">${currentUserName}</span>
                    <span class="user-prefix ${getPrefixClass(userPrefix)}">${userPrefix}</span>
                    <button class="auth-btn" onclick="logout()">Выйти</button>
                `;
            } else {
                authSection.innerHTML = `<button class="auth-btn" onclick="loginWithGoogle()">Войти через Google</button>`;
            }
        }
        
        function getPrefixClass(prefix) {
            return {
                'admin': 'prefix-admin',
                'moderator': 'prefix-moderator',
                'vip': 'prefix-vip'
            }[prefix] || '';
        }
        
        // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'forum') {
                document.getElementById('searchBox').style.display = 'none';
                document.getElementById('itemsGrid').style.display = 'none';
                document.getElementById('forumSection').style.display = 'block';
                if (currentUser) loadTopics();
            } else {
                document.getElementById('searchBox').style.display = 'block';
                document.getElementById('itemsGrid').style.display = 'grid';
                document.getElementById('forumSection').style.display = 'none';
                displayItems(tab);
            }
        }
        
        // ========== ОТОБРАЖЕНИЕ ИНСТРУМЕНТОВ ==========
        function displayItems(type = 'tools', search = '') {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = '';
            
            const filtered = items.filter(item => {
                if (item.type !== type) return false;
                if (search) {
                    const s = search.toLowerCase();
                    return item.name.toLowerCase().includes(s) ||
                           item.desc.toLowerCase().includes(s) ||
                           item.tags.some(t => t.includes(s));
                }
                return true;
            });
            
            filtered.forEach(item => {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-title">${item.name}</div>
                        <div class="card-category">${item.type}</div>
                        <div class="card-content">${item.desc}</div>
                        <div class="card-tags">🏷️ ${item.tags.join(', ')}</div>
                    </div>
                `;
            });
        }
        
        function searchItems() {
            displayItems(currentTab, document.getElementById('searchInput').value);
        }
        
        // ========== СМЕНА НИКА ==========
        function showChangeNickModal() {
            if (!currentUser) return;
            document.getElementById('newNickname').value = currentUserName;
            document.getElementById('changeNickModal').classList.add('active');
        }
        
        async function changeNickname() {
            const newNick = document.getElementById('newNickname').value.trim();
            if (!newNick || !currentUser) return;
            
            await db.collection('users').doc(currentUser.uid).update({
                name: newNick
            });
            
            currentUserName = newNick;
            updateUI();
            closeModal('changeNickModal');
        }
        
        // ========== ФОРУМ ==========
        async function loadTopics() {
            if (!currentUser) return;
            
            const snapshot = await db.collection('topics').orderBy('createdAt', 'desc').get();
            const topicsList = document.getElementById('topicsList');
            
            if (snapshot.empty) {
                topicsList.innerHTML = '<p style="color:#666; text-align:center;">Пока нет тем. Создайте первую!</p>';
                return;
            }
            
            topicsList.innerHTML = '';
            snapshot.forEach(doc => {
                const topic = doc.data();
                topicsList.innerHTML += `
                    <div class="topic-card" onclick="openTopic('${doc.id}', '${topic.title}')">
                        <div class="topic-title">${topic.title}</div>
                        <div class="topic-meta">
                            <span class="topic-author">${topic.author}</span>
                            <span>💬 ${topic.replies || 0}</span>
                            <span>📅 ${new Date(topic.createdAt?.toDate()).toLocaleString()}</span>
                        </div>
                        <div>${topic.description || ''}</div>
                    </div>
                `;
            });
        }
        
        function showNewTopicModal() {
            if (!currentUser) {
                alert('Сначала войдите');
                return;
            }
            document.getElementById('newTopicModal').classList.add('active');
        }
        
        async function createTopic() {
            const title = document.getElementById('topicTitle').value;
            const desc = document.getElementById('topicDesc').value;
            
            if (!title) return;
            
            await db.collection('topics').add({
                title,
                description: desc,
                author: currentUserName,
                authorId: currentUser.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                replies: 0
            });
            
            closeModal('newTopicModal');
            document.getElementById('topicTitle').value = '';
            document.getElementById('topicDesc').value = '';
            loadTopics();
        }
        
        // ========== ЧАТ ==========
        function openTopic(topicId, title) {
            currentTopic = { id: topicId, title };
            document.getElementById('currentTopicTitle').innerHTML = `📌 ${title}`;
            document.getElementById('chatContainer').style.display = 'block';
            
            db.collection('topics').doc(topicId).collection('messages')
                .orderBy('timestamp')
                .onSnapshot((snapshot) => {
                    const messagesDiv = document.getElementById('messages');
                    messagesDiv.innerHTML = '';
                    
                    snapshot.forEach(doc => {
                        const msg = doc.data();
                        messagesDiv.innerHTML += `
                            <div class="message">
                                <div class="message-header">
                                    <span class="message-author">${msg.author}</span>
                                    <span class="message-prefix ${getPrefixClass(msg.prefix)}">${msg.prefix}</span>
                                    <span class="message-time">${new Date(msg.timestamp?.toDate()).toLocaleTimeString()}</span>
                                </div>
                                <div>${msg.text}</div>
                            </div>
                        `;
                    });
                    
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                });
        }
        
        async function sendMessage() {
            if (!currentUser || !currentTopic) return;
            
            const text = document.getElementById('messageText').value;
            if (!text) return;
            
            await db.collection('topics').doc(currentTopic.id).collection('messages').add({
                text,
                author: currentUserName,
                authorId: currentUser.uid,
                prefix: userPrefix,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            await db.collection('topics').doc(currentTopic.id).update({
                replies: firebase.firestore.FieldValue.increment(1)
            });
            
            document.getElementById('messageText').value = '';
        }
        
        // ========== АДМИНКА ==========
        async function loadUsers() {
            if (!isAdmin) return;
            
            document.getElementById('adminPanel').style.display = 'block';
            
            const snapshot = await db.collection('users').get();
            const userList = document.getElementById('userList');
            userList.innerHTML = '';
            
            snapshot.forEach(doc => {
                const user = doc.data();
                userList.innerHTML += `
                    <div class="user-item">
                        <span>${user.name}</span>
                        <select class="user-select" onchange="changePrefix('${doc.id}', this.value)">
                            <option value="user" ${user.prefix === 'user' ? 'selected' : ''}>User</option>
                            <option value="vip" ${user.prefix === 'vip' ? 'selected' : ''}>VIP</option>
                            <option value="moderator" ${user.prefix === 'moderator' ? 'selected' : ''}>Moderator</option>
                            <option value="admin" ${user.prefix === 'admin' ? 'selected' : ''}>Admin</option>
                        </select>
                    </div>
                `;
            });
        }
        
        async function changePrefix(userId, prefix) {
            await db.collection('users').doc(userId).update({ prefix });
        }
        
        // ========== ОБЩЕЕ ==========
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        
        // ========== ЗАПУСК ==========
        displayItems('tools');
    </script>
</body>
  </html>
